<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sklep Minecraft</title>
    <style>
        /* Reset i podstawowe style */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #f5f5f5;
            line-height: 1.6;
        }

        /* Nagłówek strony */
        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1607988795691-3d0147b43231?q=80&w=1200') no-repeat center center/cover;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 4px solid #5c8e32;
        }

        header h1 {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            color: #a9c52f;
            font-weight: bold;
        }

        /* Główny kontener sklepu */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .shop-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            position: relative;
        }

        .shop-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: #5c8e32;
            margin: 10px auto 0;
        }

        /* Siatka z produktami */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Karta pojedynczego produktu */
        .product-card {
            background-color: #262626;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: #5c8e32;
        }

        .product-image {
            height: 150px;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            border-bottom: 3px solid #5c8e32;
        }

        .product-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-name {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .product-description {
            font-size: 0.9rem;
            color: #b3b3b3;
            margin-bottom: 20px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #a9c52f;
        }

        /* Przycisk Kup Teraz */
        .buy-btn {
            background-color: #5c8e32;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .buy-btn:hover {
            background-color: #466d26;
        }

        /* Stopka */
        footer {
            text-align: center;
            padding: 30px;
            margin-top: 60px;
            background-color: #111;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- Nagłówek sklepu -->
    <header>
        <h1>SKLEP CRAFTMC</h1>
        <p>IP serwera: play.craftmc.pl</p>
    </header>

    <!-- Główna zawartość -->
    <div class="container">
        <h2 class="shop-title">Wybierz kategorię lub rangę</h2>
        
        <div class="products-grid">
            
            <!-- Produkt 1: VIP -->
            <div class="product-card">
                <div class="product-image" style="background-image: linear-gradient(45deg, #f39c12, #f1c40f);">👑</div>
                <div class="product-info">
                    <div>
                        <h3 class="product-name">Ranga VIP (30 dni)</h3>
                        <p class="product-description">Zyskaj dostęp do komendy /fly, specjalnego zestawu /kit vip oraz unikalnego prefiksu na czacie!</p>
                    </div>
                    <div class="product-footer">
                        <span class="product-price">11,99 zł</span>
                        <button class="buy-btn" onclick="buyItem('Ranga VIP')">Kupuję</button>
                    </div>
                </div>
            </div>

            <!-- Produkt 2: SVIP -->
            <div class="product-card">
                <div class="product-image" style="background-image: linear-gradient(45deg, #9b59b6, #8e44ad);">💎</div>
                <div class="product-info">
                    <div>
                        <h3 class="product-name">Ranga SVIP (30 dni)</h3>
                        <p class="product-description">Wszystko to co ma VIP, a dodatkowo: /heal, pisanie na kolorowo oraz rezerwacja slotu na serwerze.</p>
                    </div>
                    <div class="product-footer">
                        <span class="product-price">19,99 zł</span>
                        <button class="buy-btn" onclick="buyItem('Ranga SVIP')">Kupuję</button>
                    </div>
                </div>
            </div>

            <!-- Produkt 3: Case z kluczami -->
            <div class="product-card">
                <div class="product-image" style="background-image: linear-gradient(45deg, #e74c3c, #c0392b);">📦</div>
                <div class="product-info">
                    <div>
                        <h3 class="product-name">5x Epicka Skrzynia</h3>
                        <p class="product-description">Klucze do skrzyń na spawnie. Masz szansę na zdobycie legendarnych mieczy oraz rzadkich surowców!</p>
                    </div>
                    <div class="product-footer">
                        <span class="product-price">7,50 zł</span>
                        <button class="buy-btn" onclick="buyItem('5x Epicka Skrzynia')">Kupuję</button>
                    </div>
                </div>
            </div>

            <!-- Produkt 4: Monety -->
            <div class="product-card">
                <div class="product-image" style="background-image: linear-gradient(45deg, #2ecc71, #27ae60);">💰</div>
                <div class="product-info">
                    <div>
                        <h3 class="product-name">10,000 Monet</h3>
                        <p class="product-description">Wirtualna waluta do wykorzystania w ekonomii serwera. Kupuj działki i handluj z graczami.</p>
                    </div>
                    <div class="product-footer">
                        <span class="product-price">5,000 zł</span>
                        <button class="buy-btn" onclick="buyItem('10,000 Monet')">Kupuję</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Stopka -->
    <footer>
        <p>&copy; 2026 Sklep CraftMC. Strona stworzona na potrzeby serwera Minecraft. Wszystkie prawa zastrzeżone.</p>
    </footer>

    <!-- Prosty skrypt obsługujący kliknięcie -->
    <script>
        function buyItem(itemName) {
            let nick = prompt("Podaj swój nick z Minecraft:");
            if (nick) {
                alert("Dziękujemy " + nick + "! Wybrałeś: " + itemName + ".\nTutaj w przyszłości podepniesz płatności (np. PaySafeCard, SMS lub BLIK).");
            }
        }
    </script>
</body>
</html>
